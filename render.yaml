services:
  - type: web
    name: german-sea-trap-online
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: AITUNNEL_API_KEY
        sync: false
      - key: AITUNNEL_BASE_URL
        value: https://api.aitunnel.ru/v1
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
